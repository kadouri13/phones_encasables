services:
  # 1. Express API backend which builds and serves the React static client
  - type: web
    name: boxfinder
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: boxfinder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  # 2. Managed PostgreSQL database
  - name: boxfinder-db
    plan: free
